databases:
  - name: cafebot-license-db
    plan: free
    databaseName: cafebot_license
    user: cafebot

services:
  - type: web
    name: cafebot-license
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: HMAC_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cafebot-license-db
          property: connectionString
